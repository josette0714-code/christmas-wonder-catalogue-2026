  html,body { margin:0; height:100%; }
  body { font-family:Georgia,'Times New Roman',serif;
    background:radial-gradient(circle at 50% 38%, #efe9dc 0%, #d8d0c0 62%, #b9ad95 100%);
    user-select:none; -webkit-user-select:none; }

  #title { position:fixed; top:calc(8px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    z-index:30; background:rgba(11,61,46,.86); color:#fff; font-size:13px; font-weight:700;
    padding:5px 14px; border-radius:20px; white-space:nowrap; letter-spacing:.3px; pointer-events:none; }
  #title .g{color:#7fe0a6;} #title .r{color:#ff9b8c;}

  /* Source pages: only copy of images. No-JS fallback = vertical scroll (never blank). */
  #pages { padding:46px 10px calc(20px + env(safe-area-inset-bottom)); }
  #pages .page { display:block; max-width:760px; margin:0 auto 14px; }
  #pages .page img { width:100%; height:auto; display:block; background:#fff; border-radius:3px;
    box-shadow:0 10px 26px rgba(0,0,0,.32); pointer-events:none; }

  body.flip { overflow:hidden; }
  body.flip #pages { position:fixed; inset:0; padding:46px 8px calc(46px + env(safe-area-inset-bottom));
    display:flex; align-items:center; justify-content:center; perspective:2400px; }
  body.flip #book { position:relative; transform-style:preserve-3d; background:#fff; border-radius:3px;
    box-shadow:0 22px 50px rgba(0,0,0,.42); }
  body.flip .page { position:absolute; inset:0; max-width:none; margin:0;
    transform-origin:left center; transform-style:preserve-3d;
    transition:transform .6s cubic-bezier(.3,.05,.2,1); will-change:transform; }
  body.flip .page img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
    box-shadow:none; backface-visibility:hidden; }
  body.flip .page::after { content:""; position:absolute; inset:0; border-radius:3px; backface-visibility:hidden;
    background:linear-gradient(90deg, rgba(0,0,0,.16) 0%, rgba(0,0,0,0) 8%, rgba(0,0,0,0) 92%, rgba(0,0,0,.10) 100%); }
  body.flip .page.flipped { transform:rotateY(-180deg); }

  .zone { display:none; }
  body.flip .zone { display:block; position:fixed; top:0; bottom:0; width:34%; z-index:15; cursor:pointer; }
  #zoneL{ left:0; } #zoneR{ right:0; }

  #counter { display:none; }
  body.flip #counter { display:block; position:fixed; bottom:calc(10px + env(safe-area-inset-bottom)); left:50%;
    transform:translateX(-50%); z-index:22; background:rgba(0,0,0,.55); color:#fff; font-size:12px;
    padding:4px 12px; border-radius:14px; pointer-events:none; }
  .nav { display:none; }
  @media (hover:hover) and (pointer:fine){
    body.flip .nav{ display:block; position:fixed; top:50%; transform:translateY(-50%); z-index:22;
      width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;background:rgba(11,61,46,.82);
      color:#fff;font-size:22px;line-height:46px;text-align:center; }
    body.flip #prev{ left:max(8px,env(safe-area-inset-left)); }
    body.flip #next{ right:max(8px,env(safe-area-inset-right)); }
  }
</style>

<script>
(function(){
  function supports3d(){ try{ var el=document.createElement('div'); el.style.transformStyle='preserve-3d';
    return el.style.transformStyle==='preserve-3d'; }catch(e){ return false; } }
  if(!supports3d()) return;
  var pagesEl=document.getElementById('pages');
  var pages=Array.prototype.slice.call(pagesEl.getElementsByClassName('page'));
  var total=pages.length;
  var bookEl=document.createElement('div'); bookEl.id='book';
  pages.forEach(function(p){ bookEl.appendChild(p); });
  pagesEl.appendChild(bookEl);
  document.body.classList.add('flip');
  var stage=pagesEl, book=bookEl, counter=document.getElementById('counter');
  var idx=0, IMG_AR=0.707;
  function sizeBook(ar){ if(ar) IMG_AR=ar; var w=stage.clientWidth-16,h=w/IMG_AR,ah=stage.clientHeight-92;
    if(h>ah){ h=ah; w=h*IMG_AR; } book.style.width=Math.round(w)+'px'; book.style.height=Math.round(h)+'px'; }
  var first=pages[0].querySelector('img');
  function tryAR(){ if(first.naturalWidth) sizeBook(first.naturalWidth/first.naturalHeight); else sizeBook(); }
  if(first.complete) tryAR(); else first.addEventListener('load', tryAR);
  sizeBook(); window.addEventListener('resize', sizeBook);
  function restack(){ for(var i=0;i<total;i++){ var p=pages[i];
    if(i<idx){ p.classList.add('flipped'); p.style.zIndex=i; }
    else { p.classList.remove('flipped'); p.style.zIndex=(total-i); } }
    counter.textContent=(idx+1)+' / '+total; }
  function next(){ if(idx<total-1){ idx++; restack(); } }
  function prev(){ if(idx>0){ idx--; restack(); } }
  document.getElementById('zoneR').addEventListener('click', next);
  document.getElementById('zoneL').addEventListener('click', prev);
  document.getElementById('next').addEventListener('click', next);
  document.getElementById('prev').addEventListener('click', prev);
  window.addEventListener('keydown', function(e){
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }
    else if(e.key==='Home'){ idx=0; restack(); } else if(e.key==='End'){ idx=total-1; restack(); } });
  var sx=null;
  stage.addEventListener('touchstart', function(e){ sx=e.touches[0].clientX; }, {passive:true});
  stage.addEventListener('touchend', function(e){ if(sx===null) return;
    var dx=e.changedTouches[0].clientX-sx; sx=null; if(dx<-40) next(); else if(dx>40) prev(); }, {passive:true});
  restack();
})();
</script>
