<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Christmas Wonder Catalogue 2026</title>
<meta property="og:title" content="Christmas Wonder Catalogue 2026">
<meta property="og:description" content="Artisan Collection — handmade Christmas gifts from around the world.">
<meta property="og:image" content="https://josette0714-code.github.io/christmas-wonder-catalogue-2026/images/page-001.jpg">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:Georgia,'Times New Roman',serif;
    background:radial-gradient(circle at 50% 38%, #efe9dc 0%, #d8d0c0 62%, #b9ad95 100%);
    user-select:none;-webkit-user-select:none;overflow:hidden;}
  #title{position:fixed;top:calc(8px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    z-index:30;background:rgba(11,61,46,.86);color:#fff;font-size:13px;font-weight:700;
    padding:5px 14px;border-radius:20px;white-space:nowrap;letter-spacing:.3px;pointer-events:none;}
  #title .g{color:#7fe0a6;} #title .r{color:#ff9b8c;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    padding:46px 10px calc(44px + env(safe-area-inset-bottom));}
  #pg{max-width:100%;max-height:100%;width:auto;height:auto;display:block;background:#fff;
    border-radius:3px;box-shadow:0 16px 40px rgba(0,0,0,.4);transition:opacity .18s ease;}
  #pg.fade{opacity:0;}
  .zone{position:fixed;top:0;bottom:0;width:38%;z-index:15;}
  #zoneL{left:0;} #zoneR{right:0;}
  .nav{position:fixed;top:50%;transform:translateY(-50%);z-index:22;width:46px;height:46px;
    border-radius:50%;border:none;cursor:pointer;background:rgba(11,61,46,.82);color:#fff;
    font-size:22px;line-height:46px;text-align:center;padding:0;}
  #prev{left:max(8px,env(safe-area-inset-left));} #next{right:max(8px,env(safe-area-inset-right));}
  #counter{position:fixed;bottom:calc(10px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    z-index:22;background:rgba(0,0,0,.55);color:#fff;font-size:12px;padding:4px 12px;border-radius:14px;pointer-events:none;}
</style>
</head>
<body>
  <div id="title"><span class="g">Christmas</span> <span class="r">Wonder</span> &middot; Catalogue 2026</div>
  <div id="stage"><img id="pg" alt="Catalogue page" decoding="async"></div>
  <div class="zone" id="zoneL"></div>
  <div class="zone" id="zoneR"></div>
  <button class="nav" id="prev" aria-label="Previous page">&#10094;</button>
  <button class="nav" id="next" aria-label="Next page">&#10095;</button>
  <div id="counter"></div>
<script>
(function(){
  var TOTAL=101;
  function src(n){ return 'images/page-'+String(n).padStart(3,'0')+'.jpg'; }
  var pg=document.getElementById('pg'), counter=document.getElementById('counter'), idx=1;
  var cache={};
  function preload(n){ if(n<1||n>TOTAL||cache[n]) return; var im=new Image(); im.src=src(n); cache[n]=im; }
  function prune(){ for(var k in cache){ if(Math.abs(k-idx)>2) delete cache[k]; } }
  function show(n){
    n=Math.max(1,Math.min(TOTAL,n)); if(n===idx && pg.src) return; idx=n;
    pg.classList.add('fade');
    var img=new Image();
    img.onload=function(){ pg.src=img.src; pg.classList.remove('fade'); };
    img.src=src(idx);
    counter.textContent=idx+' / '+TOTAL;
    preload(idx+1); preload(idx-1); prune();
  }
  function next(){ show(idx+1); } function prev(){ show(idx-1); }
  document.getElementById('zoneR').addEventListener('click',next);
  document.getElementById('zoneL').addEventListener('click',prev);
  document.getElementById('next').addEventListener('click',next);
  document.getElementById('prev').addEventListener('click',prev);
  window.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();next();}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
    else if(e.key==='Home'){show(1);} else if(e.key==='End'){show(TOTAL);} });
  var sx=null,sy=null;
  document.addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
  document.addEventListener('touchend',function(e){ if(sx===null) return;
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy; sx=null;
    if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){ if(dx<0) next(); else prev(); } },{passive:true});
  show(1);
})();
</script>
</body>
</html>
